<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Kendo Counter">

    <title>Kendo Hit Counter Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background: #000000; 
            color: white; 
            padding-top: env(safe-area-inset-top); /* 아이폰 노치 디자인 대응 */
            margin: 0; 
            overflow: hidden; /* 스크롤 방지 */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h1 { color: #A066FF; font-size: 24px; font-weight: bold; margin: 10px 0; }
        #count { font-size: 180px; font-weight: bold; color: #00FFCC; text-shadow: 0 0 20px rgba(0, 255, 204, 0.4); margin: 0; }
        
        .meter-container { width: 85%; height: 12px; background: #222; margin: 15px auto; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #meter { width: 0%; height: 100%; background: linear-gradient(90deg, #00FFCC, #00FF88); }
        
        .control-panel { background: #1a1a1a; width: 90%; margin: 0 auto; padding: 20px 15px; border-radius: 25px; border: 1px solid #333; }
        .label-text { color: #FFA500; font-weight: bold; margin-bottom: 5px; display: block; font-size: 14px; }
        input[type=range] { width: 90%; margin: 10px 0; accent-color: #007BFF; }

        .button-group { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-top: 15px; }
        button { padding: 16px 40px; font-size: 20px; cursor: pointer; border-radius: 15px; border: none; font-weight: bold; width: 90%; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-start { background: #6200EE !important; color: white !important; box-shadow: 0 4px 15px rgba(98, 0, 238, 0.5); }
        .btn-reset { background: #2a2a2a; color: #FF6B6B; border: 1px solid #444; font-size: 16px; }
        
        button:active { transform: scale(0.96); opacity: 0.9; }
        #status { color: #555; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>KENDO HIT COUNTER</h1>
    <div id="count">0</div>
    
    <div class="meter-container">
        <div id="meter"></div>
    </div>
    
    <div class="control-panel">
        <span class="label-text">Sensitivity: <span id="sensVal" style="color:#FFA500">50</span></span>
        <input type="range" id="sensitivity" min="10" max="100" value="50" oninput="updateSens(this.value)">
        
        <div class="button-group">
            <button class="btn-start" id="mainBtn" onclick="startApp()">START PRACTICE</button>
            <button class="btn-reset" onclick="resetCount()">RESET SCORE</button>
        </div>
        <div id="status">Mic Access Required</div>
    </div>

    <script>
        let count = 0;
        let isThrottled = false; 
        let threshold = 50;

        function updateSens(val) {
            threshold = parseInt(val);
            document.getElementById('sensVal').innerText = val;
        }

        function resetCount() {
            count = 0;
            document.getElementById('count').innerText = count;
        }

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                analyser.fftSize = 256;
                microphone.connect(analyser);
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                document.getElementById('status').innerText = "LISTENING... GO!";
                const mainBtn = document.getElementById('mainBtn');
                mainBtn.innerText = "RUNNING...";
                mainBtn.style.background = "#333";
                mainBtn.disabled = true;

                function checkAudio() {
                    analyser.getByteFrequencyData(dataArray);
                    let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    document.getElementById('meter').style.width = Math.min(volume * 2, 100) + "%";

                    if (volume > threshold && !isThrottled) {
                        count++;
                        document.getElementById('count').innerText = count;
                        isThrottled = true;
                        setTimeout(() => { isThrottled = false; }, 300); 
                    }
                    requestAnimationFrame(checkAudio);
                }
                checkAudio();
            } catch (err) {
                alert("Microphone Error: " + err);
            }
        }
    </script>
</body>
</html>
