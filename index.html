<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kendo Hit Counter</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding-top: 50px; }
        #count { font-size: 150px; font-weight: bold; margin: 20px 0; color: #00ff88; }
        #status { font-size: 18px; color: #888; }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; border-radius: 15px; border: none; background: #6200ee; color: white; font-weight: bold; }
        .meter-container { width: 80%; height: 25px; background: #333; margin: 30px auto; border-radius: 12px; overflow: hidden; }
        #meter { width: 0%; height: 100%; background: #00ff88; transition: width 0.1s; }
    </style>
</head>
<body>
    <h1>Hit Counter</h1>
    <div id="status">Press the button to start</div>
    <div class="meter-container"><div id="meter"></div></div>
    <div id="count">0</div>
    <button onclick="startApp()">START PRACTICE</button>

    <script>
        let count = 0;
        let isThrottled = false; 
        const THRESHOLD = 50; // You can change this number (30-70) if it's too sensitive or not enough

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                
                analyser.fftSize = 256;
                microphone.connect(analyser);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                document.getElementById('status').innerText = "Listening... Hit the tire!";

                function checkAudio() {
                    analyser.getByteFrequencyData(dataArray);
                    let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    
                    document.getElementById('meter').style.width = Math.min(volume * 2, 100) + "%";

                    if (volume > THRESHOLD && !isThrottled) {
                        count++;
                        document.getElementById('count').innerText = count;
                        
                        isThrottled = true;
                        setTimeout(() => { isThrottled = false; }, 300); 
                    }
                    requestAnimationFrame(checkAudio);
                }
                checkAudio();
            } catch (err) {
                alert("Microphone access required: " + err);
            }
        }
    </script>
</body>
</html>
