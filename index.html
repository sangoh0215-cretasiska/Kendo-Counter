<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hit Counter</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #000; color: #fff; margin: 0; padding: 20px; overflow: hidden; }
        h1 { color: #bb86fc; font-size: 22px; margin-bottom: 5px; }
        
        /* Main Counter Display */
        #count { font-size: 200px; font-weight: bold; color: #03dac6; margin: 0; line-height: 1; }
        
        /* Sound Level Meter */
        .meter-box { width: 90%; height: 12px; background: #222; margin: 20px auto; border-radius: 6px; overflow: hidden; border: 1px solid #444; }
        #meter-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #03dac6, #f44336); transition: width 0.05s; }

        .control-panel { background: #1a1a1a; padding: 20px; border-radius: 20px; width: 90%; margin: 10px auto; box-sizing: border-box; }
        
        /* Sensitivity Slider */
        .slider-group { margin-bottom: 25px; }
        label { display: block; color: #888; margin-bottom: 10px; font-size: 14px; }
        input[type=range] { width: 100%; cursor: pointer; }
        #threshold-val { color: #ff9800; font-weight: bold; font-size: 18px; }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        button { padding: 18px; font-size: 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #start-btn { background: #6200ee; color: #fff; box-shadow: 0 4px 10px rgba(98,0,238,0.3); }
        #reset-btn { background: #333; color: #cf6679; border: 1px solid #cf6679; }
        button:active { transform: scale(0.97); opacity: 0.8; }
        
        .status-msg { font-size: 13px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>HIT COUNTER</h1>
    
    <div id="count">0</div>

    <div class="meter-box">
        <div id="meter-bar"></div>
    </div>

    <div class="control-panel">
        <div class="slider-group">
            <label>Sensitivity (Threshold): <span id="threshold-val">50</span> dB</label>
            <input type="range" id="threshold-slider" min="10" max="100" value="50">
            <p style="font-size: 11px; color: #555; margin-top:5px;">Lower = More Sensitive | Higher = Only Loud Hits</p>
        </div>

        <div class="btn-group">
            <button id="start-btn">START PRACTICE</button>
            <button id="reset-btn">RESET SCORE</button>
        </div>
        <div class="status-msg" id="status-text">Mic Access Required</div>
    </div>

    <script>
        let counter = 0;
        let isListening = false;
        let lastHitTime = 0;
        const cooldown = 300; // 0.3 seconds dead-time
        
        const countDisplay = document.getElementById('count');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const thresholdSlider = document.getElementById('threshold-slider');
        const thresholdVal = document.getElementById('threshold-val');
        const meterBar = document.getElementById('meter-bar');
        const statusText = document.getElementById('status-text');

        // Update threshold display
        thresholdSlider.oninput = function() {
            thresholdVal.innerText = this.value;
        };

        resetBtn.onclick = function() {
            counter = 0;
            countDisplay.innerText = "0";
        };

        startBtn.onclick = async function() {
            if (isListening) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);

                analyser.fftSize = 256;
                source.connect(analyser);

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                isListening = true;
                startBtn.innerText = "LISTENING...";
                startBtn.style.background = "#222";
                startBtn.style.color = "#555";
                statusText.innerText = "Mic Active - Start Practice!";

                function processAudio() {
                    analyser.getByteFrequencyData(dataArray);
                    
                    // RMS (Root Mean Square) calculation for volume level
                    let sum = 0;
                    for(let i=0; i<bufferLength; i++) {
                        sum += dataArray[i];
                    }
                    let volume = sum / bufferLength;
                    
                    // Update Meter
                    meterBar.style.width = volume + "%";

                    // Detection Algorithm
                    let threshold = parseInt(thresholdSlider.value);
                    let now = Date.now();

                    if (volume > threshold && (now - lastHitTime > cooldown)) {
                        counter++;
                        countDisplay.innerText = counter;
                        lastHitTime = now;
                        
                        // Visual feedback on hit
                        countDisplay.style.color = "#fff";
                        setTimeout(() => { countDisplay.style.color = "#03dac6"; }, 100);
                    }

                    requestAnimationFrame(processAudio);
                }

                processAudio();

            } catch (err) {
                alert("Please check microphone permissions in your browser: " + err);
                statusText.innerText = "Access Denied";
            }
        };
    </script>
</body>
</html>
