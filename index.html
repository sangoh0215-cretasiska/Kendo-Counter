# 앱이 실행되는 동안 반복
while recording:
    current_volume = get_microphone_volume() # 현재 소리 크기 측정
    
    # 설정한 기준보다 소리가 크고, 마지막 타격 후 0.3초가 지났다면
    if current_volume > threshold and time_since_last_hit > 0.3:
        count += 1
        update_screen(count) # 화면에 숫자 표시
        last_hit_time = current_time # 마지막 타격 시간 업데이트
