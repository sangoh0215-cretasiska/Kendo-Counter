<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kendo Hit Counter</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding-top: 40px; margin: 0; }
        h1 { color: #bb86fc; font-size: 24px; letter-spacing: 1px; }
        #status { font-size: 16px; color: #888; margin-bottom: 5px; }
        #count { font-size: 160px; font-weight: bold; margin: 10px 0; color: #03dac6; text-shadow: 0 0 20px rgba(3, 218, 198, 0.2); }
        
        /* Sound Meter */
        .meter-container { width: 85%; height: 15px; background: #333; margin: 20px auto; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        #meter { width: 0%; height: 100%; background: linear-gradient(90deg, #03dac6, #00ff88); transition: width 0.1s; }
        
        .button-group { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 20px; }
        
        button { padding: 18px 40px; font-size: 22px; cursor: pointer; border-radius: 50px; border: none; font-weight: bold; width: 80%; transition: 0.2s; }
        .btn-start { background: #6200ee; color: white; box-shadow: 0 4px 15px rgba(98, 0, 238, 0.4); }
        .btn-reset { background: #333; color: #cf6679; border: 1px solid #cf6679; font-size: 18px; padding: 12px 30px; margin-top: 10px; }
        
        button:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body>
    <h1>KENDO HIT COUNTER</h1>
    <div id="status">Tap the button to start</div>
    
    <div class="meter-container">
        <div id="meter"></div>
    </div>
    
    <div id="count">0</div>
    
    <div class="button-group">
        <button class="btn-start" id="mainBtn" onclick="startApp()">START PRACTICE</button>
        <button class="btn-reset" onclick="resetCount()">RESET SCORE</button>
    </div>

    <script>
        let count = 0;
        let isThrottled = false; 
        const THRESHOLD = 50; // Sensitivity (Adjust between 30-70 if needed)

        function resetCount() {
            count = 0;
            document.getElementById('count').innerText = count;
        }

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                
                analyser.fftSize = 256;
                microphone.connect(analyser);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                // Update UI State
                document.getElementById('status').innerText = "LISTENING... HIT THE TIRE!";
                const mainBtn = document.getElementById('mainBtn');
                mainBtn.innerText = "RUNNING";
                mainBtn.style.background = "#222";
                mainBtn.style.color = "#555";
                mainBtn.disabled = true;

                function checkAudio() {
                    analyser.getByteFrequencyData(dataArray);
                    let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
                    
                    // Visual Meter Update
                    document.getElementById('meter').style.width = Math.min(volume * 2, 100) + "%";

                    // Detection Logic
                    if (volume > THRESHOLD
